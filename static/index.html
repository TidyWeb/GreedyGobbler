<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Greedy Gobbler - Machine Readable Conversion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --green-primary:       #006241;
            --green-primary-hover: #004e34;
            --green-house:         #1e3932;
            --green-light:         #d4e9e2;
            --gold:                #cba258;
            --gold-light:          #faf6ee;
            --warm-white:          #f2f0eb;
            --white:               #ffffff;
            --text:                rgba(30, 57, 50, 0.87);
            --text-muted:          rgba(30, 57, 50, 0.45);
            --error-bg:            #fde8e7;
            --error-text:          #d62b1f;
            --error-border:        #f5c6cb;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Lato', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--warm-white);
            max-width: 840px;
            margin: 48px auto;
            padding: 0 24px 64px;
            line-height: 1.6;
            color: var(--text);
        }

        header {
            display: flex;
            align-items: center;
            gap: 48px;
            margin-bottom: 32px;
        }

        #logo {
            height: 176px;
            width: auto;
            flex-shrink: 0;
            mix-blend-mode: multiply;
        }

        .header-text {
            text-align: center;
        }

        h1 {
            font-size: 4.8rem;
            font-weight: 700;
            color: var(--green-house);
            margin-bottom: 6px;
            letter-spacing: -0.03em;
            line-height: 1;
        }

        .subtitle {
            color: var(--text-muted);
            margin-bottom: 0;
            font-size: 0.95rem;
        }

        /* ── URL zone ─────────────────────────────────────── */
        #url-zone {
            margin-bottom: 12px;
            display: flex;
            gap: 10px;
        }

        #url-input {
            flex-grow: 1;
            padding: 12px 22px;
            border: 1.5px solid var(--green-light);
            border-radius: 50px;
            background: var(--white);
            font-family: inherit;
            font-size: 0.95rem;
            color: var(--green-house);
            outline: none;
            transition: border-color 0.2s;
        }

        #url-input:focus { border-color: var(--green-primary); }
        #url-input::placeholder { color: var(--text-muted); }

        /* ── Buttons ──────────────────────────────────────── */
        .btn {
            padding: 12px 28px;
            cursor: pointer;
            background: var(--green-primary);
            color: var(--white);
            border: none;
            border-radius: 50px;
            font-family: inherit;
            font-weight: 700;
            font-size: 0.9rem;
            letter-spacing: 0.04em;
            transition: background 0.2s, transform 0.1s;
            white-space: nowrap;
        }

        .btn:hover:not(:disabled)   { background: var(--green-primary-hover); }
        .btn:active:not(:disabled)  { transform: scale(0.97); }

        .btn:disabled {
            background: var(--green-light);
            color: var(--text-muted);
            cursor: not-allowed;
        }

        .btn-secondary             { background: var(--green-house); }
        .btn-secondary:hover:not(:disabled) { background: #162d27; }

        .btn-ghost {
            padding: 8px 18px;
            font-size: 0.82rem;
            font-weight: 400;
            background: transparent;
            border: 1.5px solid var(--green-light);
            color: var(--text-muted);
        }

        .btn-ghost:hover:not(:disabled) {
            background: var(--gold-light);
            color: var(--green-house);
        }

        /* ── Drop zone ────────────────────────────────────── */
        #drop-zone {
            border: 2px dashed var(--green-light);
            padding: 44px 20px;
            text-align: center;
            margin-bottom: 16px;
            border-radius: 16px;
            cursor: pointer;
            background: var(--white);
            transition: border-color 0.2s, background 0.2s;
        }

        #drop-zone:hover, #drop-zone.drag-over {
            border-color: var(--green-primary);
            background: var(--gold-light);
        }

        #drop-zone strong {
            display: block;
            font-size: 1rem;
            font-weight: 700;
            color: var(--green-house);
            margin-bottom: 6px;
        }

        #drop-zone small { color: var(--text-muted); font-size: 0.82rem; }

        /* ── Status bar ───────────────────────────────────── */
        #status {
            margin-bottom: 16px;
            padding: 14px 22px;
            display: flex;
            border-radius: 12px;
            align-items: center;
            gap: 10px;
            min-height: 50px;
            background: var(--white);
            border: 1.5px solid var(--green-light);
            font-size: 0.9rem;
            transition: background 0.2s, border-color 0.2s;
        }

        #status.success {
            background: var(--green-light);
            color: var(--green-house);
            border-color: #afd4c8;
        }

        #status.error {
            background: var(--error-bg);
            color: var(--error-text);
            border-color: var(--error-border);
        }

        #status.warning {
            background: var(--gold-light);
            color: #7a5c1e;
            border-color: var(--gold);
        }

        .spinner {
            border: 3px solid var(--green-light);
            border-top: 3px solid var(--green-primary);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            0%   { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* ── Preview ──────────────────────────────────────── */
        .preview-container { display: flex; flex-direction: column; }

        .preview-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .preview-meta {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .preview-label {
            font-weight: 700;
            font-size: 0.78rem;
            color: var(--green-house);
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        /* ── Raw / Normalised toggle ──────────────────────── */
        #toggle-container {
            display: flex;
            border: 1.5px solid var(--green-light);
            border-radius: 50px;
            overflow: hidden;
            background: var(--white);
        }

        .toggle-btn {
            padding: 5px 16px;
            cursor: pointer;
            background: transparent;
            color: var(--text-muted);
            border: none;
            font-family: inherit;
            font-size: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.03em;
            transition: background 0.15s, color 0.15s;
        }

        .toggle-btn.active          { background: var(--gold); color: var(--white); }
        .toggle-btn:not(.active):hover { background: var(--gold-light); color: var(--green-house); }

        #button-container { display: flex; gap: 10px; }

        #output-preview {
            width: 100%;
            height: 440px;
            padding: 20px 24px;
            border: 1.5px solid var(--green-light);
            border-radius: 12px;
            white-space: pre-wrap;
            overflow-y: auto;
            background: var(--white);
            display: block;
            color: var(--text-muted);
            box-sizing: border-box;
            font-family: inherit;
            font-size: 0.88rem;
            line-height: 1.75;
        }
    </style>
</head>
<body>
    <header>
        <img src="static/gobbler.png" id="logo" alt="Gobbler logo">
        <div class="header-text">
            <h1>Greedy Gobbler</h1>
            <p class="subtitle">Convert documents and websites to machine-readable Markdown.</p>
        </div>
    </header>
    <div id="url-zone">
        <input type="text" id="url-input" placeholder="Enter website URL (e.g., https://example.com)">
        <button id="clear-btn" class="btn btn-ghost">Clear</button>
        <button id="crawl-btn" class="btn">Process URL</button>
    </div>
    <div id="drop-zone">
        <strong>Drag and drop files here</strong>
        <small>.pdf, .docx, .xlsx, .pptx, .html, .epub, .csv, images &amp; more</small>
    </div>
    <div id="status">
        <div class="spinner" id="loading-spinner"></div>
        <span id="status-text">Ready to process.</span>
    </div>
    <div class="preview-container">
        <div class="preview-header">
            <div class="preview-meta">
                <span class="preview-label">Content Preview</span>
                <div id="toggle-container">
                    <button class="toggle-btn active" id="btn-cleaned">Normalised</button>
                    <button class="toggle-btn" id="btn-raw">Raw</button>
                </div>
            </div>
            <div id="button-container">
                <button id="copy-btn" class="btn btn-secondary" disabled>Copy</button>
                <button id="save-btn" class="btn" disabled>Save .md</button>
            </div>
        </div>
        <div id="output-preview">No content loaded yet...</div>
    </div>
    <script src="static/app.js"></script>
</body>
</html>
